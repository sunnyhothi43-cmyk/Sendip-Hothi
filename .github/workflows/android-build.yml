name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Bundle and APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        working-directory: ./
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        working-directory: ./
        run: npm run build

      - name: Sync Capacitor Android Project
        working-directory: ./
        run: npx cap sync android

      - name: Verify Android Project Exists
        working-directory: ./
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "ERROR: android/gradlew not found. Capacitor sync may have failed."
            exit 1
          fi

      - name: Fix Gradle Wrapper Permissions
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Clean Build
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release AAB
        run: ./gradlew bundleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
