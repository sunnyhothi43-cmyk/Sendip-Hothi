name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Web UI

jobs:
  build:
    name: Build Android Bundle and APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Fix Line Endings and Grant Execute Permissions for Gradlew
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          build-root-directory: android

      - name: Clean build folders to remove obsolete cache and old assets
        run: |
          cd android
          ./gradlew clean

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Release AAB (Android App Bundle)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
