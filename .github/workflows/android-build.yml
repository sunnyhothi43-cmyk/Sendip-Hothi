name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Bundle and APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || echo "Licenses already accepted or sdkmanager not found"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        working-directory: ./
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        working-directory: ./
        run: npm run build

      - name: Sync Capacitor Android Project
        working-directory: ./
        run: npx cap sync android

      - name: Generate Valid App Icons
        working-directory: ./
        run: |
          # Install ImageMagick to create valid PNGs
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Create valid 48x48 mdpi icons
          convert -size 48x48 xc:blue android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 48x48 xc:green android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          convert -size 48x48 xc:red android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          
          # Also fix other density folders if they exist
          for dir in android/app/src/main/res/mipmap-*; do
            if [ -d "$dir" ]; then
              size=$(basename "$dir" | sed 's/mipmap-//')
              case $size in
                mdpi) px=48 ;;
                hdpi) px=72 ;;
                xhdpi) px=96 ;;
                xxhdpi) px=144 ;;
                xxxhdpi) px=192 ;;
                *) px=48 ;;
              esac
              convert -size ${px}x${px} xc:blue "$dir/ic_launcher.png" 2>/dev/null || true
              convert -size ${px}x${px} xc:green "$dir/ic_launcher_foreground.png" 2>/dev/null || true
              convert -size ${px}x${px} xc:red "$dir/ic_launcher_round.png" 2>/dev/null || true
            fi
          done

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Clean Build
        run: gradle clean

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Build Release AAB
        run: gradle bundleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
