name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Bundle and APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || echo "Licenses already accepted or sdkmanager not found"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        working-directory: ./
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        working-directory: ./
        run: npm run build

      - name: Sync Capacitor Android Project
        working-directory: ./
        run: npx cap sync android

      - name: Fix All Corrupted PNG Images
        working-directory: ./
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # Function to create a valid PNG at specific size
          fix_png() {
            local file="$1"
            local size="$2"
            if [ -f "$file" ]; then
              # Check if it's a valid PNG by trying to identify it
              if ! identify "$file" >/dev/null 2>&1; then
                echo "Fixing corrupted: $file"
                convert -size "${size}x${size}" xc:blue "$file"
              fi
            fi
          }
          
          # Fix mipmap icons
          fix_png "android/app/src/main/res/mipmap-mdpi/ic_launcher.png" 48
          fix_png "android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png" 48
          fix_png "android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png" 48
          
          # Fix splash screens
          fix_png "android/app/src/main/res/drawable/splash.png" 192
          fix_png "android/app/src/main/res/drawable-land-mdpi/splash.png" 192
          fix_png "android/app/src/main/res/drawable-port-mdpi/splash.png" 192
          
          # Fix any other PNGs that might be corrupted
          find android/app/src/main/res -name "*.png" | while read file; do
            if ! identify "$file" >/dev/null 2>&1; then
              echo "Fixing corrupted PNG: $file"
              # Determine approximate size from path
              if echo "$file" | grep -q "mdpi"; then size=48
              elif echo "$file" | grep -q "hdpi"; then size=72
              elif echo "$file" | grep -q "xhdpi"; then size=96
              elif echo "$file" | grep -q "xxhdpi"; then size=144
              elif echo "$file" | grep -q "xxxhdpi"; then size=192
              elif echo "$file" | grep -q "splash"; then size=192
              else size=96
              fi
              convert -size "${size}x${size}" xc:blue "$file"
            fi
          done
          
          # Also remove any duplicate PNGs in anydpi-v26 folders
          find android/app/src/main/res -path "*/mipmap-anydpi*/*.png" -delete

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Clean Build
        run: gradle clean

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Build Release AAB
        run: gradle bundleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordstream-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
