name: Android Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          npx cap sync android

      - name: Setup Android Resources
        run: |
          rm -rf android/app/src/main/res/mipmap-*
          rm -rf android/app/src/main/res/drawable-*
          mkdir -p android/app/src/main/res/drawable
          
          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
            <path
                android:fillColor="#FF6B6B"
                android:pathData="M54,9C30.91,9 12,27.91 12,51C12,74.09 30.91,93 54,93C77.09,93 96,74.09 96,51C96,27.91 77.09,9 54,9ZM54,84C35.7,84 21,69.3 21,51C21,32.7 35.7,18 54,18C72.3,18 87,32.7 87,51C87,69.3 72.3,84 54,84Z"/>
            <path
                android:fillColor="#FFD93D"
                android:pathData="M54,36C43.5,36 35,44.5 35,55C35,65.5 43.5,74 54,74C64.5,74 73,65.5 73,55C73,44.5 64.5,36 54,36Z"/>
          </vector>
          EOF

      - name: Build Android App Bundle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease -x lint -x test

      - name: Sign AAB
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonRaw: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.chordstream.app
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          track: internal
          status: draft
